k<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumière Du Progrès</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .card { padding: 20px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 10px; max-width: 400px; }
    input { padding: 5px; margin-right: 10px; width: 150px; }
    button { padding: 5px 10px; }
    table { border-collapse: collapse; width: 100%; max-width: 600px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>

<h1>Lumière Du Progrès</h1>

<div class="card">
  <h2>Create User</h2>
  <input type="text" id="new-username" placeholder="Username">
  <button onclick="createUser()">Create User</button>
</div>

<div class="card">
  <h2>Deposit / Withdraw</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="number" id="amount" placeholder="Amount">
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
  <h2>Users</h2>
  <button onclick="fetchUsers()">Refresh Users</button>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Balance</th>
      </tr>
    </thead>
    <tbody id="users-table-body">
      <!-- Users will appear here -->
    </tbody>
  </table>
</div>

<script>
const API_URL = "https://ldp-backend-ltrm.onrender.com"; // Backend URL yawe

// --- Fetch users ---
async function fetchUsers() {
  try {
    const res = await fetch(`${API_URL}/users`);
    const data = await res.json();
    const tbody = document.getElementById("users-table-body");
    tbody.innerHTML = "";
    data.forEach(user => {
      const row = document.createElement("tr");
      row.innerHTML = `<td>${user.id}</td><td>${user.username}</td><td>${user.balance}</td>`;
      tbody.appendChild(row);
    });
  } catch (e) {
    alert("Failed to fetch users");
    console.log(e);
  }
}

// --- Create User ---
async function createUser() {
  const username = document.getElementById("new-username").value.trim();
  if (!username) return alert("Enter a username");
  try {
    const res = await fetch(`${API_URL}/users`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username })
    });
    const text = await res.text();
    try {
      const data = JSON.parse(text);
      if (!res.ok) return alert(data.error || "Failed to create user");
      alert("User created!");
      fetchUsers();
      document.getElementById("new-username").value = "";
    } catch {
      alert("Server did not return JSON");
      console.log(text);
    }
  } catch (e) {
    alert("Network error");
    console.log(e);
  }
}

// --- Deposit ---
async function deposit() {
  const username = document.getElementById("username").value.trim();
  const amount = Number(document.getElementById("amount").value);
  if (!username || !amount) return alert("Enter username and amount");
  try {
    const res = await fetch(`${API_URL}/deposit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, amount })
    });
    const text = await res.text();
    try {
      const data = JSON.parse(text);
      if (!res.ok) return alert(data.error || "Deposit failed");
      alert("Deposit successful");
      fetchUsers();
      document.getElementById("amount").value = "";
    } catch {
      alert("Server did not return JSON");
      console.log(text);
    }
  } catch (e) {
    alert("Network error");
    console.log(e);
  }
}

// --- Withdraw ---
async function withdraw() {
  const username = document.getElementById("username").value.trim();
  const amount = Number(document.getElementById("amount").value);
  if (!username || !amount) return alert("Enter username and amount");
  try {
    const res = await fetch(`${API_URL}/withdraw`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, amount })
    });
    const text = await res.text();
    try {
      const data = JSON.parse(text);
      if (!res.ok) return alert(data.error || "Withdraw failed");
      alert("Withdraw successful");
      fetchUsers();
      document.getElementById("amount").value = "";
    } catch {
      alert("Server did not return JSON");
      console.log(text);
    }
  } catch (e) {
    alert("Network error");
    console.log(e);
  }
}

// --- Load users on start ---
fetchUsers();
</script>

</body>
</html>
